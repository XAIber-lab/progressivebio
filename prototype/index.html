<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link type="text/css" href="stylesheets/style.css" rel="stylesheet">
    <link type="text/css" href="stylesheets/visualization.css" rel="stylesheet">

    <script src="https://unpkg.com/d3-force-boundary@0.0.1/dist/d3-force-boundary.min.js"></script>
    <title>BioFabric</title>
</head>
<body style="background-color:white;">

<div class="row1">
    <div class="row1Column1 ">
        <div class="row1row1">
            <div class="mainCaption">BioFabric</div>
            <div class="mainCaptionAdd">Quality Metrics and Reordering Strategies for Revealing Patterns</div>
            <img id="vislogo" src="" alt="">
        </div>
        <p class="authorsName"></p>

        <div class="dropdownMenuDiv btn-group">
            <div class="dropdownMenuElements">
                <select class="selectGroup form-select form-select-lg mb-3 btn-group" aria-label=".form-select-lg example" required name="visualization" id="visualizationSelect">
                    <option value="" disabled>Visualization</option>
                    <option value="biofabric" selected>BioFabric</option>
                    <option value="adjacency">Adjacency Matrix</option>
                    <option value="nodelink">Node-Link Diagram</option>
                </select>
            </div>
            <div class="dropdownMenuElements">
                <select class="selectGroup form-select form-select-lg mb-3 btn-group" aria-label=".form-select-lg example" required name="data" id="dataSelect">
                    <option value="" disabled>Data</option>
                    <option title="14 Nodes, 19 Edges" value="teaser" selected>Synthetic Network</option>
                    <option title="25 Nodes, 28 Edges" value="grafo2700.25">Rome-Lib Dataset grafo2700.25</option>
                    <!-- <option title="25 Nodes, 58 Edges" value="grafo7200.42">Rome-Lib Dataset grafo7200.42</option> -->
                    <option title="20 Nodes, 19 Edges" value="grafo2611.20">Rome-Lib Dataset grafo2611.20</option>
                    <option title="20 Nodes, 31 Edges" value="grafo2209.20">Rome-Lib Dataset grafo2209.20</option>
                    <option title="50 Nodes, 54 Edges" value="grafo2874.50">Rome-Lib Dataset grafo2874.50</option>
                    <option title="50 Nodes, 78 Edges" value="grafo4468.50">Rome-Lib Dataset grafo4468.50</option>
                    <option title="80 Nodes, 93 Edges" value="grafo6448.80">Rome-Lib Dataset grafo6448.80</option>
                    <option title="80 Nodes, 127 Edges" value="grafo7907.80">Rome-Lib Dataset grafo7907.80</option>
                    <!-- <option value="dataCustom">Load Custom Data</option> -->
                </select>
            </div>
            <div class="dropdownMenuElements">
                <select class="selectGroup form-select form-select-lg mb-3 btn-group" aria-label=".form-select-lg example" required name="nodeOrdering" id="nodeOrderingSelect">
                    <option value="" disabled>Node Ordering</option>
                    <option value="alphabetical" id="alphabetical" selected>Alphabetical</option>
                    <option value="random">Random</option>
                    <option value="degree">Degree</option>
                    <option value="rcm" id="cuthill">Reverse Cuthill-McKee</option>
                    <option value="gansner" id="gansner">Barycentric</option>
                    <option value="force" id="force">Force-Directed</option>
                    <option value="annealing">Simulated Annealing</option>
                </select>
            </div>
            <div class="dropdownMenuElements">
                <select class="selectGroup form-select form-select-lg mb-3 btn-group" aria-label=".form-select-lg example" required name="edgeOrdering" id="edgeOrderingSelect">
                    <option value="" disabled>Edge Ordering</option>
                    <option value="random">Random</option>
                    <option value="degree">Degree</option>
                    <option value="nodes">Node Indices</option>
                    <option value="degreecending" selected>Degreecending</option>
                </select>
            </div>
            <div class="dropdownMenuElements">
                <select class="selectGroup form-select form-select-lg mb-3 btn-group" aria-label=".form-select-lg example" required name="pattern" id="patternSelect">
                    <option value="" disabled selected>Pattern</option>
                    <option value="">None</option>
                    <option value="runway">Runway</option>
                    <option value="staircase">Staircase</option>
                    <!-- <option value="escalator">Escalator</option> -->
                    <option value="path">Path</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div class="row2">
    <div id="row2Column1" class="row2Column1 rounded" style="border: thin solid lightgray">
        <div class="summary"></div>
        <svg id="vis"></svg>
    </div>
</div>

<div class="patternTooltip"></div>

    <button id="buttonFeedback" class="btn btn-secondary"> You have feedback? </button>

        <button id="buttonImpressum" class="btn btn-secondary"> Imprint </button>

    <button id="buttonData" class="btn btn-secondary"> Data Privacy </button>

    <img id="konlogo" src="" alt="">
</div>

<script src="scripts/script.js"></script>
<script src="scripts/pattern.js"></script>
<script src="scripts/reorder.min.js"></script>
<script src="scripts/orderings.js"></script>
<script src="scripts/visualization.js"></script>

</html>
